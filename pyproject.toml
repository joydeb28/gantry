[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "agentic-support-weaver"
version = "0.1.0"
description = "A small, offline-first agentic AI pattern for customer support ticket resolution."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Joydeb Mondal" }]
keywords = ["agentic-ai", "customer-support", "agents", "ollama", "automation"]
dependencies = []

[project.scripts]
support-weaver = "support_weaver.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
